# Terminalizer recording for sdg_hub demo
# Targeting Claude Code demo.gif style
config:
  command: null
  cwd: /tmp
  env:
    recording: true
  cols: 80
  rows: 22
  repeat: 0
  quality: 100
  frameDelay: auto
  maxIdleTime: 2000
  frameBox:
    type: floating
    title: sdg hub
    style:
      boxShadow: 0px 8px 30px rgba(0, 0, 0, 0.4)
      margin: 20px
  watermark:
    imagePath: null
  cursorStyle: bar
  fontFamily: "Menlo, Monaco, monospace"
  fontSize: 13
  lineHeight: 1.5
  letterSpacing: 0
  theme:
    background: "#1a2332"
    foreground: "#c8c0b8"
    cursor: "#e8975d"
    black: "#1a2332"
    red: "#c4746e"
    green: "#7daa8c"
    yellow: "#e8975d"
    blue: "#8097c4"
    magenta: "#a88bb8"
    cyan: "#6b9086"
    white: "#c8c0b8"
    brightBlack: "#5c5650"
    brightRed: "#c4746e"
    brightGreen: "#7daa8c"
    brightYellow: "#f0a96e"
    brightBlue: "#8097c4"
    brightMagenta: "#a88bb8"
    brightCyan: "#6b9086"
    brightWhite: "#fafaf9"

