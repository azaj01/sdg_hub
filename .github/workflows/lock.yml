name: Lock File Validation

on:
  push:
    branches:
      - "main"
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches:
      - "main"
    paths:
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  validate-lock:
    name: "Validate uv.lock"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check lock file is up to date
        run: uv lock --check
