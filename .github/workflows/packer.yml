# SPDX-License-Identifier: Apache-2.0

name: Build AMI with Packer

on:
  workflow_dispatch:

env:
  LC_ALL: en_US.UTF-8

defaults:
  run:
    shell: bash

jobs:
  build-ami:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for OIDC
      contents: read

    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: arn:aws:iam::851725220677:role/github-actions-packer-role
          aws-region: us-east-2
          role-session-name: github-actions-packer  # For tracking in CloudTrail

      - name: Setup Packer
        uses: hashicorp/setup-packer@c3d53c525d422944e50ee27b840746d6522b08de

      - name: Build and create AMI
        run: |
          set -euo pipefail
          cd scripts/packer
          packer init .
          packer validate .
          packer build .
